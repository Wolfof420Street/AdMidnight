name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn turbo lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn turbo type-check

  test:
    name: Tests (Vitest)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admidnight
          POSTGRES_PASSWORD: admidnight_test
          POSTGRES_DB: admidnight_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://admidnight:admidnight_test@localhost:5432/admidnight_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_secret_at_least_32_characters_long
      MIDNIGHT_NETWORK_ID: undeployed
      MIDNIGHT_PROOF_SERVER_URL: http://localhost:6300
      MIDNIGHT_INDEXER_GRAPHQL_URL: http://localhost:6400/graphql
      MIDNIGHT_INDEXER_WS_URL: ws://localhost:6400/graphql
      MIDNIGHT_PRIVATE_STATE_PASSWORD: test_password_16chars
      MIDNIGHT_PRIVATE_STATE_STORE: test-store
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn turbo build --filter=@admidnight/shared --filter=@admidnight/midnight-sdk-wrapper
      - run: yarn workspace @admidnight/api exec prisma migrate deploy
      - run: yarn turbo test --filter=@admidnight/api
        env:
          CI: true

  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn turbo build --filter=!@admidnight/zk-circuits
      - uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


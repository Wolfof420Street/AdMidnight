# Midnight Indexer service — GraphQL API for querying blockchain data
version: '3.9'

services:
  indexer:
    image: midnightntwrk/indexer-standalone:4.0.2
    container_name: admidnight-indexer
    environment:
      - APP__APPLICATION__NETWORK_ID=${CFG_PRESET:-undeployed}
      - APP__INFRA__NODE__URL=ws://midnight-node:9944
      - APP__INFRA__API__PORT=8088
      # REQUIRED: hex-encoded 32-byte secret for indexer authentication
      - APP__INFRA__SECRET=${INDEXER_SECRET:?INDEXER_SECRET must be set (openssl rand -hex 32)}
    ports:
      - "8088:8088"     # GraphQL HTTP and WebSocket API
    depends_on:
      midnight-node:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/api/v4/graphql -X POST -H 'Content-Type: application/json' -d '{\"query\":\"{ __typename }\"}' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - indexer_data:/data

volumes:
  indexer_data:
